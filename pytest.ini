[pytest]
testpaths = tests
# Put the repo root on sys.path so tests resolve `import observability` even
# when the package isn't installed editable.
pythonpath = .
addopts =
    -ra
    --strict-markers
    --cov=observability
    --cov-report=term-missing
# Coverage threshold is enforced in CI (--cov-fail-under), not here, so a
# partial local run doesn't fail.
